name: E2E Tests and Report Generation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r web/requirements.txt

    - name: Run E2E Tests
      run: |
        python web/e2e_test.py
      continue-on-error: true # Upload report even if some test cases fail

    - name: Upload Test Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: E2E-Test-Report
        path: |
          web/test_report.xlsx
          web/test_report_new.xlsx
        if-no-files-found: warn
