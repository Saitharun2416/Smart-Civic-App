name: Android CI and E2E Test Run

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: macos-latest # macOS is recommended for emulator runner for hardware acceleration

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Local Unit Tests
      run: ./gradlew testDebugUnitTest

    - name: Run E2E Instrumented Tests (Emulator)
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        script: ./gradlew connectedAndroidTest

    - name: Upload Unit Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Android-UnitTest-Report
        path: app/build/reports/tests/testDebugUnitTest/

    - name: Upload E2E Instrumented Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Android-E2E-InstrumentedTest-Report
        path: app/build/reports/androidTests/connected/
