name: Android CI and E2E Test Run

on:
  push:
  pull_request:


jobs:
  build-and-test:
    runs-on: macos-15-intel # Intel macOS is required for emulator hardware acceleration

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Run Local Unit Tests
      run: ./gradlew testDebugUnitTest

    - name: Run E2E Instrumented Tests (Emulator)
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        target: google_apis
        arch: x86_64
        script: ./gradlew connectedAndroidTest

    - name: Upload Unit Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Android-UnitTest-Report
        path: app/build/reports/tests/testDebugUnitTest/

    - name: Upload E2E Instrumented Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Android-E2E-InstrumentedTest-Report
        path: app/build/reports/androidTests/connected/


    - name: Set up Python for Excel Reporting
      if: always()
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Excel Reporting Dependencies
      if: always()
      run: |
        python -m pip install --upgrade pip
        python -m pip install pandas openpyxl

    - name: Generate Excel Test Report
      if: always()
      run: python generate_report.py

    - name: Upload Excel Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Android-Excel-Test-Report
        path: android_test_report.xlsx
        if-no-files-found: ignore
